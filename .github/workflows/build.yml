name: Build LaskaERP

on:
  workflow_dispatch:   # тільки вручну через кнопку на GitHub
  push:
    tags:
      - 'v*'           # або коли пушиш тег: git tag v1.0 && git push --tags

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Python deps + PyInstaller
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Build backend EXE (sidecar)
        working-directory: backend
        run: pyinstaller server.spec --noconfirm

      - name: Copy sidecar binary
        shell: pwsh
        run: |
          $Triple = (rustc -vV | Select-String "host:").ToString().Split(":")[1].Trim()
          Write-Host "Target triple: $Triple"
          New-Item -ItemType Directory -Force -Path "src-tauri/binaries"
          Copy-Item "backend/dist/server.exe" "src-tauri/binaries/server-$Triple.exe" -Force

      - name: Generate placeholder icons
        shell: pwsh
        run: |
          pip install pillow
          python -c "
from PIL import Image
import os
os.makedirs('src-tauri/icons', exist_ok=True)
img = Image.new('RGBA', (512, 512), (52, 152, 219, 255))
img.save('src-tauri/icons/512x512.png')
for size, name in [(32,'32x32'),(128,'128x128'),(256,'128x128@2x')]:
    img.resize((size,size), Image.LANCZOS).save(f'src-tauri/icons/{name}.png')
img.resize((256,256), Image.LANCZOS).save('src-tauri/icons/icon.ico')
print('Icons generated')
"

      - name: Build Tauri app
        run: npx --prefix frontend tauri build
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/src-tauri/target

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: LaskaERP-installer
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          retention-days: 30
