name: Build LaskaERP

on:
  push:
    branches: [main, master]
  workflow_dispatch:   # кнопка ручного запуску на GitHub

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Python deps + PyInstaller
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Build backend EXE (sidecar)
        working-directory: backend
        run: pyinstaller server.spec --noconfirm

      - name: Copy sidecar binary
        shell: pwsh
        run: |
          $Triple = (rustc -vV | Select-String "host:").ToString().Split(":")[1].Trim()
          Write-Host "Target triple: $Triple"
          New-Item -ItemType Directory -Force -Path "src-tauri/binaries"
          Copy-Item "backend/dist/server.exe" "src-tauri/binaries/server-$Triple.exe" -Force

      - name: Build Tauri app
        working-directory: frontend
        run: npx tauri build
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/src-tauri/target

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: LaskaERP-installer
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          retention-days: 30
