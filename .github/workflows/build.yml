name: Build LaskaERP

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Python deps
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Build backend EXE
        working-directory: backend
        run: pyinstaller server.spec --noconfirm

      - name: Copy sidecar binary
        shell: pwsh
        run: |
          $Triple = (rustc -vV | Select-String "host:").ToString().Split(":")[1].Trim()
          New-Item -ItemType Directory -Force -Path "src-tauri/binaries" | Out-Null
          Copy-Item "backend/dist/server.exe" "src-tauri/binaries/server-$Triple.exe" -Force
          Write-Host "Copied sidecar: server-$Triple.exe"

      - name: Generate icons
        shell: pwsh
        run: |
          pip install pillow
          $source = if (Test-Path "src-tauri/icons/icon.png") { "src-tauri/icons/icon.png" } else { $null }
          $code = @"
from PIL import Image
import os
os.makedirs("src-tauri/icons", exist_ok=True)
src = r"$source"
img = Image.open(src).convert("RGBA") if src and os.path.exists(src) else Image.new("RGBA", (512, 512), (52, 152, 219, 255))
img.resize((512, 512), Image.LANCZOS).save("src-tauri/icons/512x512.png")
img.resize((256, 256), Image.LANCZOS).save("src-tauri/icons/128x128@2x.png")
img.resize((128, 128), Image.LANCZOS).save("src-tauri/icons/128x128.png")
img.resize((32, 32),   Image.LANCZOS).save("src-tauri/icons/32x32.png")
img.resize((256, 256), Image.LANCZOS).save("src-tauri/icons/icon.ico")
print("Icons OK")
"@
          $code | python

      - name: Build Tauri app
        run: npx --prefix frontend tauri build
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/src-tauri/target

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: LaskaERP-installer
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          retention-days: 30
