name: Build LaskaERP

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Install Python deps
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Build backend EXE
        run: pyinstaller server.spec --noconfirm
        working-directory: backend

      - name: Copy sidecar + generate icons
        shell: pwsh
        run: |
          $triple = (rustc -vV | Select-String "host:").ToString().Split(":")[1].Trim()
          New-Item -ItemType Directory -Force -Path "src-tauri/binaries" | Out-Null
          Copy-Item "backend/dist/server.exe" "src-tauri/binaries/server-$triple.exe" -Force
          pip install pillow
          New-Item -ItemType Directory -Force -Path "src-tauri/icons" | Out-Null
          python -c "from PIL import Image; import os; img=Image.new('RGBA',(512,512),(52,152,219,255)); [img.resize((s,s)).save(f'src-tauri/icons/{n}') for s,n in [(512,'512x512.png'),(256,'128x128@2x.png'),(128,'128x128.png'),(32,'32x32.png'),(256,'icon.ico')]]"

      - name: Build Tauri
        run: npx --prefix frontend tauri build
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/src-tauri/target

      - uses: actions/upload-artifact@v4
        with:
          name: LaskaERP-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30
